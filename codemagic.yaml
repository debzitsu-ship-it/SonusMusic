workflows:
  android-workflow:
    name: Android Workflow
    max_build_duration: 60

    environment:
      node: latest

    scripts:
      - npm install
      - npm run build
      - npm install @capacitor/core @capacitor/cli @capacitor/android
      - npx cap sync android
      - cd android
      - chmod +x gradlew
      - ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk

